name: tests

# Runs the synthetic-image test suite. No sedutil content is involved and no
# artifacts are uploaded (Tier 0: this repo never distributes PBA images).

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run tests
        run: python -m unittest discover -s tests -v
